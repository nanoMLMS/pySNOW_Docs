site_name: pySNOW Documentation

theme:
  name: material
  
  logo: assets/logo_2.png
  favicon: assets/favicon.ico
  features:
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tooltips
    - content.footnote.tooltips
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: green
      accent: deep purple

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep orange


nav:
  - Home: index.md
  - About: about.md
  - Installation: install.md

  - Tutorials:
    - Single Atom Descriptors:
      - Generalized Coordination Number: GCN.md
      - Common Neighbour Analysis: CNA.md
    - Global Descriptors:
      - Distribution Functions: pddf_rdf.md 
    - Building Things:
      - Adding Molecules: add_molecule.md

  - Modules:
    - Descriptors:
        - GCN: descriptors/gcn.md
        - LAE: descriptors/lae.md
        - Steinhardt: descriptors/steinhardt.md
    - Misc:
        - Constants: misc/constants.md
        - Transform: misc/transform.md
    - IO:
        - xyz: io/xyz.md

markdown_extensions:
  - attr_list
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - md_in_html
  - pymdownx.blocks.caption

plugins:
- search
- mkdocstrings:
    handlers:
      python:
        options:
          docstring_style: numpy
          show_source: true #collapsible show_source button
          show_root_heading: true #show where we are
          members_order: source    # keeps the order from the source file

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
copyright: Copyright &copy; 2025 nanoMLMS
site_dir: site
